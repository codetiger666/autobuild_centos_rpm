  centos-build-zabbix-server:
      name: centos-build-zabbix-server
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v2

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/localtime
          sudo ln -s /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          # sudo apt remove php* dotnet* google* 
          sudo rm -rf \
            /usr/share/dotnet \
            /etc/mysql \
            /etc/php
  
      - name: run-centos
        run: |
          mkdir rpm
          centos=`docker run -itd -v $(pwd)/rpm:/opt centos:7`
          echo "export centos=$centos" >> $HOME/.profile
          source $HOME/.profile
          docker exec -i $centos yum install wget -y
          docker cp zabbix/.rpmmacros $centos:/root/.rpmmacros
          docker exec -i $centos rm -rf /etc/yum.repos.d/*
          docker exec -i $centos wget -P /etc/yum.repos.d/ https://raw.githubusercontent.com/codetiger666/linux/master/scripts/linux/centos/centos.repo
          docker exec -i $centos yum install epel-release wget curl rpm-build luajit rpmdevtools pcre-devel make openssl-devel gcc gd libxslt-devel libxml2-devel geoip-devel libatomic_ops-devel perl-ExtUtils-Embed gd-devel mysql-community-client mysql-community-common mysql-community-libs mysql-community-devel mysql-community-libs-compat net-snmp-devel libssh2-devel OpenIPMI-devel libevent-devel openldap-devel libcurl-devel -y
          docker exec -i $centos rpmdev-setuptree
          
          
      - name: init-build
        run: |
          sudo /bin/cp zabbix/zabbix_server.conf rpm/rpmbuild/SOURCES
          sudo /bin/cp zabbix/sendmail.sh rpm/rpmbuild/SOURCES
          sudo /bin/cp zabbix/zabbix_server.service rpm/rpmbuild/SOURCES
          sudo cat << EOF >zabbix-server.spec
          Name:          zabbix-server
          Version:        $ZABBIXVERSION
          Release:        1%{?dist}
          Summary:        自编译zabbix server

          Group:		nn
          License:	GPL
          URL:		https://gybyt.cn
          Source0:	https://cdn.zabbix.com/zabbix/sources/stable/6.0/%{name}-%{version}.tar.gz
          Source1:	zabbix_server.conf
          Source2:	sendmail.sh
          Source3:	zabbix_server.service

          BuildRequires:	mysql-community-client mysql-community-common mysql-community-libs mysql-community-devel mysql-community-libs-compat net-snmp-devel libssh2-devel OpenIPMI-devel libevent-devel openldap-devel libcurl-devel
          Requires:	net-snmp mysql-community-client mysql-community-common mysql-community-libs mysql-community-devel mysql-community-libs-compat libssh2 OpenIPMI libevent openldap libcurl

          %description
          zabbix服务端后端自编译

          %prep
          %setup -q


          %build
          CFLAGS="-fPIC" ./configure --prefix=/usr/local/zabbix --enable-server --enable-agent --with-mysql --with-net-snmp --with-libcurl --with-libxml2 --enable-ipv6 --with-openipmi --with-ldap --with-ssh2 --enable-proxy
          make %{?_smp_mflags}


          %install
          rm -rf $RPM_BUILD_ROOT
          make install DESTDIR=%{buildroot}
          %{__install} -p -D -m 0644 %{SOURCE1} %{buildroot}%{_usr}/local/zabbix/etc/zabbix_server.conf
          %{__install} -p -D -m 0755 %{SOURCE2} %{buildroot}%{_usr}/local/zabbix/share/zabbix/alertscripts/sendmail.sh
          %{__install} -p -D -m 0644 %{SOURCE3} %{buildroot}%{_usr}/lib/systemd/system/zabbix_server.service
          %{__mkdir} -p %{buildroot}%{_usr}/local/zabbix/source
          cp -r %{_builddir}/%{name}-%{version}/database %{buildroot}%{_usr}/local/zabbix/source

          # 安装前准备
          %pre
          if [ $1 == 1 ]; then
            %if 0%{?use_systemd}
                          if [ -f /usr/lib/systemd/system/zabbix_server.service ]
                          %systemd_preun zabbix_server.service
                          fi
                  %endif
                  count=`ps -ef |grep zabbix_server |grep -v "grep" |wc -l`
                  if [ $count -gt 0 ]; then
